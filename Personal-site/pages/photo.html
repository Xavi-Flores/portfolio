<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo — Xavi Flores</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <!-- Header -->
  <header id="site-header">
    <a class="logo" href="../index.html">Xavi Flores</a>
    <nav>
      <a href="about.html" id="nav-about">About</a>
      <a href="video.html" id="nav-video">Video</a>
      <a href="photo.html" id="nav-photo">Photo</a>
    </nav>
  </header>

  <!-- Photo Grid (populated dynamically by photo.js) -->
  <main class="page-wrap">
    <div class="photo-grid" id="photo-grid">
      <!-- Photos are fetched from /api/photos and inserted here at runtime -->
    </div>
    <p class="placeholder-label" id="photo-status" style="text-align:center; padding: 40px 0; display:none;">
      Loading photos…
    </p>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button class="lightbox-close" id="lb-close" aria-label="Close">&times;</button>
    <button class="lightbox-arrow prev" id="lb-prev" aria-label="Previous">&#8592;</button>
    <div class="lightbox-img-wrap">
      <img id="lb-img" src="" alt="" />
    </div>
    <button class="lightbox-arrow next" id="lb-next" aria-label="Next">&#8594;</button>
    <p class="lightbox-counter" id="lb-counter"></p>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/photo.js"></script>
  <script>initPage('photo');</script>

</body>
</html>
