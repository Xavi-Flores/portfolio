<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video — Xavi Flores</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <!-- Header -->
  <header id="site-header">
    <a class="logo" href="../index.html">Xavi Flores</a>
    <nav>
      <a href="about.html" id="nav-about">About</a>
      <a href="video.html" id="nav-video">Video</a>
      <a href="photo.html" id="nav-photo">Photo</a>
    </nav>
  </header>

  <!-- Quality Toggle: WebM (fast) / MP4 (quality) -->
  <button class="quality-toggle" id="quality-toggle" aria-pressed="false" aria-label="Toggle video quality">
    <span class="quality-toggle-track">
      <span class="quality-toggle-thumb"></span>
    </span>
    <span class="quality-toggle-labels">
      <span class="quality-label quality-label-webm active" id="label-webm">WebM</span>
      <span class="quality-label-sep">/</span>
      <span class="quality-label quality-label-mp4" id="label-mp4">MP4</span>
    </span>
  </button>

  <!-- Video List (populated dynamically by video.js) -->
  <main class="page-wrap">
    <div class="video-list" id="video-list">
      <!-- Videos are fetched from /api/videos and inserted here at runtime -->
    </div>
    <p class="placeholder-label" id="video-status" style="text-align:center; padding: 40px 0; display:none;">
      Loading videos…
    </p>
  </main>

  <!-- Video Lightbox -->
  <div class="video-lightbox" id="video-lightbox" role="dialog" aria-modal="true" aria-label="Video viewer">
    <button class="video-lightbox-close" id="vlb-close" aria-label="Close">&times;</button>
    <div class="video-lightbox-inner">
      <iframe id="vlb-iframe" src="" allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;" allowfullscreen></iframe>
      <p class="video-lightbox-title" id="vlb-title"></p>
      <p class="video-lightbox-description" id="vlb-description"></p>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/video.js"></script>
  <script>initPage('video');</script>

</body>
</html>
